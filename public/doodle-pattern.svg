<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <!--
    Rasi Mom & Baby — Neo-Brutalist Hand-Drawn Baby Doodle Wallpaper Tile.
    Seamless 3x3 grid tile featuring colorful baby items with bold dark ink (#2B2140) outlines.
  -->
  <defs>
    <g id="doodles">
      <!-- 1. Baby Bottle (top-left): sky blue body, yellow top, white lines -->
      <g transform="translate(60,60) rotate(-12)">
        <!-- Bottle body fill -->
        <rect x="-12" y="-16" width="24" height="32" rx="6" fill="#C7E9FF" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Measurement lines -->
        <path d="M4,-8 h5 M4,-1 h5 M4,6 h5" stroke="#2B2140" stroke-width="2" stroke-linecap="round"/>
        <!-- Ring/Cap fill -->
        <rect x="-14" y="-22" width="28" height="8" rx="3" fill="#FFE1A8" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Nipple fill -->
        <path d="M-6,-22 C-6,-32 6,-32 6,-22 Z" fill="#FFE66D" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
      </g>

      <!-- 2. Party Balloon (top-right): vibrant pink balloon with dark string -->
      <g transform="translate(270,65) rotate(12)">
        <path d="M0,-26 C12,-26 18,-15 18,-6 C18,5 9,12 0,13 C-9,12 -18,5 -18,-6 C-18,-15 -12,-26 0,-26 Z" fill="#FFCBD9" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Shine mark -->
        <path d="M-8,-16 C-4,-22 2,-22 6,-20" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- Knot -->
        <polygon points="-4,13 4,13 0,17" fill="#EC5D8A" stroke="#2B2140" stroke-width="2" stroke-linejoin="round"/>
        <!-- String -->
        <path d="M0,17 Q8,26 -2,35 Q-10,43 2,50" fill="none" stroke="#2B2140" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- 3. Rubber Duck / Toy (top-centre): bright yellow duck -->
      <g transform="translate(165,45) rotate(-6)">
        <!-- Duck body -->
        <path d="M-14,4 C-14,-4 -4,-6 2,-6 C10,-6 14,-2 14,4 C14,10 6,14 -4,14 C-12,14 -14,10 -14,4 Z" fill="#FFE66D" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Duck head -->
        <circle cx="-10" cy="-6" r="8" fill="#FFE66D" stroke="#2B2140" stroke-width="2.5"/>
        <!-- Eye -->
        <circle cx="-12" cy="-8" r="1.5" fill="#2B2140"/>
        <!-- Beak -->
        <path d="M-18,-6 Q-22,-4 -17,-1 Z" fill="#FFD6C2" stroke="#2B2140" stroke-width="2" stroke-linejoin="round"/>
      </g>

      <!-- 4. Safety Pin (centre-left): lavender head & mint coil -->
      <g transform="translate(75,170) rotate(-8)">
        <path d="M-22,-6 L14,-6" stroke="#2B2140" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M16,3 L-20,8" stroke="#2B2140" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Coil -->
        <circle cx="-20" cy="1" r="5" fill="#B9EBDD" stroke="#2B2140" stroke-width="2.5"/>
        <!-- Cap head -->
        <rect x="8" y="-12" width="16" height="14" rx="4" fill="#E4D6FF" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
      </g>

      <!-- 5. Baby Rattle (bottom-left): mint handle + pink ring -->
      <g transform="translate(85,280) rotate(15)">
        <circle cx="0" cy="-14" r="14" fill="#FFCBD9" stroke="#2B2140" stroke-width="2.5"/>
        <circle cx="0" cy="-14" r="6" fill="#FFE1A8" stroke="#2B2140" stroke-width="2"/>
        <path d="M0,0 L0,22" stroke="#2B2140" stroke-width="3" stroke-linecap="round"/>
        <circle cx="0" cy="24" r="5" fill="#B9EBDD" stroke="#2B2140" stroke-width="2.5"/>
      </g>

      <!-- 6. Love Heart (bottom-right): brand pink heart with neo outline -->
      <g transform="translate(285,270) rotate(-10)">
        <path d="M0,12 C-12,2 -18,-6 -10,-15 C-5,-20 0,-15 0,-9 C0,-15 5,-20 10,-15 C18,-6 12,2 0,12 Z" fill="#EC5D8A" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Highlight -->
        <path d="M-7,-12 C-4,-15 -2,-14 -1,-11" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- 7. Baby Stroller / Pram (centre-right): pistachio green body & purple wheels -->
      <g transform="translate(265,175) rotate(5)">
        <!-- Carriage body -->
        <path d="M-14,2 A14,14 0 0,0 14,2 H-14 Z" fill="#D6E8B0" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Hood -->
        <path d="M-14,2 A14,14 0 0,1 0,-12 H-14 Z" fill="#FFCBD9" stroke="#2B2140" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Wheels -->
        <circle cx="-8" cy="10" r="4" fill="#E4D6FF" stroke="#2B2140" stroke-width="2"/>
        <circle cx="8" cy="10" r="4" fill="#E4D6FF" stroke="#2B2140" stroke-width="2"/>
        <!-- Handle -->
        <path d="M-14,-2 L-20,-8" stroke="#2B2140" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- 8. Sparkles & Stars (fillers in mint, yellow & purple) -->
      <!-- Top star -->
      <g transform="translate(180,140)">
        <path d="M0,-10 C1,-2 3,-1 10,0 C3,1 1,2 0,10 C-1,2 -3,1 -10,0 C-3,-1 -1,-2 0,-10 Z" fill="#FFE66D" stroke="#2B2140" stroke-width="1.8" stroke-linejoin="round"/>
      </g>
      <!-- Centre-top sparkle -->
      <g transform="translate(120,95) rotate(15)">
        <circle cx="0" cy="0" r="4" fill="#B9EBDD" stroke="#2B2140" stroke-width="2"/>
      </g>
      <!-- Centre-bottom star -->
      <g transform="translate(195,250) rotate(8)">
        <path d="M0,-8 C0.8,-1.6 1.6,-0.8 8,0 C1.6,0.8 0.8,1.6 0,8 C-0.8,1.6 -1.6,0.8 -8,0 C-1.6,-0.8 -0.8,-1.6 0,-8 Z" fill="#E4D6FF" stroke="#2B2140" stroke-width="1.8" stroke-linejoin="round"/>
      </g>
      <!-- Bottom sparkle -->
      <g transform="translate(325,120) rotate(-12)">
        <circle cx="0" cy="0" r="3.5" fill="#FFD6C2" stroke="#2B2140" stroke-width="1.8"/>
      </g>
    </g>
  </defs>

  <!-- 3x3 stamp so edge-crossing doodles wrap seamlessly; viewport clips to one 360x360 tile -->
  <use href="#doodles" x="-360" y="-360"/>
  <use href="#doodles" x="0"    y="-360"/>
  <use href="#doodles" x="360"  y="-360"/>
  <use href="#doodles" x="-360" y="0"/>
  <use href="#doodles" x="0"    y="0"/>
  <use href="#doodles" x="360"  y="0"/>
  <use href="#doodles" x="-360" y="360"/>
  <use href="#doodles" x="0"    y="360"/>
  <use href="#doodles" x="360"  y="360"/>
</svg>
