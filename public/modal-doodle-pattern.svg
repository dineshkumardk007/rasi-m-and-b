<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!--
    Rasi Mom & Baby — Product Modal Smooth Pastel Wallpaper Tile.
    Seamless 300x300 tile with soft pastel fills and neo-brutalist dark outlines.
  -->
  <defs>
    <g id="modal-doodles">
      <!-- 1. Soft Teddy Bear Face (top-left) -->
      <g transform="translate(50,50) rotate(-8)">
        <!-- Ears -->
        <circle cx="-12" cy="-10" r="7" fill="#FFE1A8" stroke="#2B2140" stroke-width="2.2"/>
        <circle cx="12" cy="-10" r="7" fill="#FFE1A8" stroke="#2B2140" stroke-width="2.2"/>
        <!-- Face -->
        <circle cx="0" cy="0" r="15" fill="#FFF3D6" stroke="#2B2140" stroke-width="2.2"/>
        <!-- Snout -->
        <ellipse cx="0" cy="3" rx="6" ry="4.5" fill="#FFFFFF" stroke="#2B2140" stroke-width="1.8"/>
        <!-- Eyes & Nose -->
        <circle cx="-5" cy="-2" r="1.5" fill="#2B2140"/>
        <circle cx="5" cy="-2" r="1.5" fill="#2B2140"/>
        <ellipse cx="0" cy="2" rx="2" ry="1.2" fill="#2B2140"/>
      </g>

      <!-- 2. Smooth Floating Cloud (top-right) -->
      <g transform="translate(225,55) rotate(6)">
        <path d="M-16,6 C-22,6 -24,-2 -18,-6 C-16,-12 -8,-14 -2,-10 C4,-16 14,-14 18,-6 C24,-4 22,6 16,6 Z" fill="#E3F2FD" stroke="#2B2140" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M-8,-2 C-6,-5 -2,-5 0,-3" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
      </g>

      <!-- 3. Baby Socks (centre-left) -->
      <g transform="translate(65,155) rotate(-14)">
        <path d="M-8,-14 H4 V2 C4,6 8,8 10,12 C11,16 6,18 0,16 C-6,14 -8,8 -8,2 Z" fill="#FFCBD9" stroke="#2B2140" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- Cuff -->
        <rect x="-10" y="-18" width="16" height="6" rx="2" fill="#FFE66D" stroke="#2B2140" stroke-width="2.0" stroke-linejoin="round"/>
      </g>

      <!-- 4. Pacifier / Soother (centre) -->
      <g transform="translate(150,135) rotate(10)">
        <!-- Ring -->
        <circle cx="0" cy="14" r="8" fill="none" stroke="#2B2140" stroke-width="2.2"/>
        <!-- Shield -->
        <path d="M-12,2 C-12,-4 12,-4 12,2 C12,8 -12,8 -12,2 Z" fill="#B9EBDD" stroke="#2B2140" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- Teat -->
        <path d="M-5,-4 C-5,-12 5,-12 5,-4 Z" fill="#FFE1A8" stroke="#2B2140" stroke-width="2.0" stroke-linejoin="round"/>
      </g>

      <!-- 5. Cute Baby Bootie / Milk Box (centre-right) -->
      <g transform="translate(245,160) rotate(-6)">
        <rect x="-10" y="-12" width="20" height="24" rx="4" fill="#E4D6FF" stroke="#2B2140" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- Heart stamp -->
        <path d="M0,4 C-4,-1 -6,-4 -3,-7 C-1,-9 0,-7 0,-4 C0,-7 1,-9 3,-7 C6,-4 4,-1 0,4 Z" fill="#EC5D8A" stroke="#2B2140" stroke-width="1.5" stroke-linejoin="round"/>
      </g>

      <!-- 6. Smooth Pastel Star & Sparkle (bottom-left) -->
      <g transform="translate(75,250) rotate(12)">
        <path d="M0,-12 C1.5,-3 3,-1.5 12,0 C3,1.5 1.5,3 0,12 C-1.5,3 -3,1.5 -12,0 C-3,-1.5 -1.5,-3 0,-12 Z" fill="#FFE66D" stroke="#2B2140" stroke-width="2.0" stroke-linejoin="round"/>
      </g>

      <!-- 7. Smooth Baby Rattle (bottom-centre) -->
      <g transform="translate(160,240) rotate(-15)">
        <circle cx="0" cy="-10" r="11" fill="#C7E9FF" stroke="#2B2140" stroke-width="2.2"/>
        <circle cx="0" cy="-10" r="4" fill="#FFCBD9" stroke="#2B2140" stroke-width="1.8"/>
        <path d="M0,1 L0,18" stroke="#2B2140" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="0" cy="20" r="4" fill="#FFE1A8" stroke="#2B2140" stroke-width="2.0"/>
      </g>

      <!-- 8. Smooth Heart (bottom-right) -->
      <g transform="translate(250,250) rotate(8)">
        <path d="M0,10 C-10,1 -14,-5 -8,-12 C-4,-16 0,-12 0,-7 C0,-12 4,-16 8,-12 C14,-5 10,1 0,10 Z" fill="#FF85C0" stroke="#2B2140" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M-5,-10 C-3,-12 -1,-11 0,-9" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
      </g>

      <!-- Small filler pastel dots -->
      <circle cx="150" cy="40" r="3" fill="#FFCBD9" stroke="#2B2140" stroke-width="1.5"/>
      <circle cx="110" cy="90" r="2.5" fill="#B9EBDD" stroke="#2B2140" stroke-width="1.5"/>
      <circle cx="210" cy="100" r="3.5" fill="#FFE66D" stroke="#2B2140" stroke-width="1.5"/>
      <circle cx="115" cy="200" r="3" fill="#E4D6FF" stroke="#2B2140" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- 3x3 seamless stamp grid -->
  <use href="#modal-doodles" x="-300" y="-300"/>
  <use href="#modal-doodles" x="0"    y="-300"/>
  <use href="#modal-doodles" x="300"  y="-300"/>
  <use href="#modal-doodles" x="-300" y="0"/>
  <use href="#modal-doodles" x="0"    y="0"/>
  <use href="#modal-doodles" x="300"  y="0"/>
  <use href="#modal-doodles" x="-300" y="300"/>
  <use href="#modal-doodles" x="0"    y="300"/>
  <use href="#modal-doodles" x="300"  y="300"/>
</svg>
